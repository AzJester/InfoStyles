<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InfoStyles — Infographic Style Library</title>
    <meta
      name="description"
      content="Browse 1,500+ infographic & slide styles with NotebookLM and OpenAI image prompts, and create new styles from a description."
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23111827'/%3E%3Crect x='22' y='24' width='24' height='24' rx='5' fill='%2338bdf8'/%3E%3Crect x='54' y='24' width='24' height='24' rx='5' fill='%238b5cf6'/%3E%3Crect x='22' y='56' width='24' height='24' rx='5' fill='%2322c55e'/%3E%3Crect x='54' y='56' width='24' height='24' rx='5' fill='%23facc15'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <h1>InfoStyles</h1>
        <span class="count-badge" id="resultCount"></span>
      </div>
      <div class="controls">
        <input
          type="search"
          id="search"
          class="search"
          placeholder="Search styles, fields, colors…"
          autocomplete="off"
          spellcheck="false"
        />
        <select id="categoryFilter" class="select" aria-label="Filter by category">
          <option value="">All categories</option>
        </select>
        <button id="newStyleBtn" class="btn btn-primary">+ New style</button>
        <button id="settingsBtn" class="btn btn-icon" title="Settings" aria-label="Settings">⚙</button>
      </div>
    </header>

    <main>
      <div id="gallery" class="gallery"></div>
      <div id="empty" class="empty" hidden>No styles match your search.</div>
      <div id="sentinel" class="sentinel"></div>
    </main>

    <!-- Settings modal -->
    <div id="settingsModal" class="modal" hidden>
      <div class="modal-card">
        <header class="modal-head">
          <h2>Settings</h2>
          <button class="btn btn-icon modal-close" data-close>✕</button>
        </header>
        <label class="field">
          <span class="field-label">Anthropic API key</span>
          <input type="password" id="apiKeyInput" class="input" placeholder="sk-ant-…" autocomplete="off" />
          <span class="field-help">
            Stored only in this browser (localStorage). Used to call the Claude API
            directly from your browser. Never uploaded or committed.
          </span>
        </label>
        <label class="field">
          <span class="field-label">Model</span>
          <select id="modelSelect" class="input"></select>
        </label>
        <footer class="modal-foot">
          <button class="btn" id="clearKeyBtn">Clear key</button>
          <button class="btn btn-primary" id="saveSettingsBtn">Save</button>
        </footer>
      </div>
    </div>

    <!-- Create-style modal -->
    <div id="createModal" class="modal" hidden>
      <div class="modal-card modal-wide">
        <header class="modal-head">
          <h2>Create a new style</h2>
          <button class="btn btn-icon modal-close" data-close>✕</button>
        </header>
        <label class="field">
          <span class="field-label">Describe the style in plain language</span>
          <textarea
            id="nlInput"
            class="input textarea"
            rows="3"
            placeholder="e.g. A retro 1980s synthwave style for a marketing deck — neon grid, bold geometric headers, dark background"
          ></textarea>
        </label>
        <div class="field-row">
          <label class="field">
            <span class="field-label">Category (optional)</span>
            <input type="text" id="hintCategory" class="input" placeholder="e.g. Marketing" />
          </label>
          <label class="field">
            <span class="field-label">Base palette hints (optional)</span>
            <input type="text" id="hintPalette" class="input" placeholder="e.g. neon pink, cyan, dark navy" />
          </label>
        </div>
        <footer class="modal-foot">
          <span id="createStatus" class="status"></span>
          <button class="btn btn-primary" id="generateBtn">Generate</button>
        </footer>
        <div id="createResult" class="create-result" hidden></div>
      </div>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
