name: InfoStyles CI / Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs on every PR / branch push: proves the data generates from the CSV.
  # Has no GitHub Pages dependency, so it stays green before Pages is enabled.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build styles.json from CSV
        run: python build_styles.py
      - name: Verify generated data is non-empty
        run: |
          python - <<'PY'
          import json, sys
          styles = json.load(open("app/data/styles.json"))
          cats = json.load(open("app/data/categories.json"))
          assert len(styles) > 0, "no styles generated"
          assert len(cats) > 0, "no categories generated"
          print(f"OK: {len(styles)} styles, {len(cats)} categories")
          PY

  # Deploys the live site. Only runs on main, and only once GitHub Pages is
  # enabled for the repo (Settings -> Pages -> Source: GitHub Actions).
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build styles.json from CSV
        run: python build_styles.py
      - uses: actions/configure-pages@v5
      - name: Upload app/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
