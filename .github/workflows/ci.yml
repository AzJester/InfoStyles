name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Deployment is handled by Render's GitHub integration; this workflow just
# verifies the data builds and the unit tests pass.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build styles.json from CSV
        run: python build_styles.py
      - name: Build prompts.json from CSV
        run: python build_prompts.py
      - name: Verify generated data is non-empty
        run: |
          python - <<'PY'
          import json
          styles = json.load(open("public/data/styles.json"))
          cats = json.load(open("public/data/categories.json"))
          prompts = json.load(open("public/data/prompts.json"))
          assert len(styles) > 0, "no styles generated"
          assert len(cats) > 0, "no categories generated"
          assert len(prompts) > 0, "no prompts generated"
          print(f"OK: {len(styles)} styles, {len(cats)} categories, {len(prompts)} prompts")
          PY
      # Production serves the committed JSON (Render never runs the builds),
      # so fail if someone edited a CSV without regenerating the data.
      - name: Committed data matches the CSVs
        run: git diff --exit-code -- public/data/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Unit tests
        run: node --test
